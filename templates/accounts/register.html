<h2>Cadastro</h2>

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    <input name="username" placeholder="Usuário">
    <input name="password" type="password" placeholder="Senha">
    <button type="submit">Cadastrar</button>
</form>

<a href="/accounts/login/">Já tenho conta</a>
